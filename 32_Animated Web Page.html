<!DOCTYPE html>
<html>
<head>
<style>
div {
    width: 100px;
    height: 100px;
    background: red;
    position: relative;
    animation: move 3s infinite;
}

@keyframes move {
    0% {left: 0px;}
    50% {left: 200px;}
    100% {left: 0px;}
}
</style>
</head>

<body>
<div></div>
</body>
</html>
