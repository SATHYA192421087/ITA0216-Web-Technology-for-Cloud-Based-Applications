<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#e1f5fe;
}

.box{
width:250px;
padding:20px;
border:5px solid #1565c0;
margin:40px auto;
background:#bbdefb;
}

</style>

</head>

<body>

<h2>CSS Box Model Example</h2>

<div class="box">

<p>This box demonstrates the CSS Box Model.</p>

<p>
Content + Padding + Border + Margin
</p>

</div>

</body>
</html>
