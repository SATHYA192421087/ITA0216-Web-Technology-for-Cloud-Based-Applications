<!DOCTYPE html>
<html>
<head>
<title>Inline and Internal CSS</title>

<style>
h2{
color:blue;
text-align:center;
}

.box{
border:2px solid black;
padding:20px;
width:300px;
margin:auto;
text-align:center;
}
</style>

</head>

<body>

<h2>Internal CSS Example</h2>

<div class="box">

<p style="color:red;font-size:18px;">
This text uses Inline CSS.
</p>

<p>
This text uses Internal CSS styling.
</p>

</div>

</body>
</html>
