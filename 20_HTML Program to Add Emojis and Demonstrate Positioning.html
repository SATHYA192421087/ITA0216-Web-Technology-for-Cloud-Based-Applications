<!DOCTYPE html>
<html>
<head>
<title>Emojis and Positioning</title>

<style>

body{
font-family:Arial;
background:#fff3e0;
text-align:center;
height:100vh;
}

.container{
position:relative;
height:300px;
margin-top:40px;
}

.emoji{
font-size:40px;
position:absolute;
}

.top{
top:10px;
left:50%;
}

.left{
top:120px;
left:20px;
}

.right{
top:120px;
right:20px;
}

.bottom{
bottom:10px;
left:50%;
}

</style>

</head>

<body>

<h2>Emoji Positioning Example</h2>

<div class="container">

<div class="emoji top">😀</div>
<div class="emoji left">🚀</div>
<div class="emoji right">🔥</div>
<div class="emoji bottom">🎉</div>

</div>

</body>
</html>
