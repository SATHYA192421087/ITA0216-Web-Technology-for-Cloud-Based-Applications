<!DOCTYPE html>
<html>
<head>
<title>Picture Slider</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h1{
color:#0d47a1;
margin-bottom:20px;
}

/* Slider */
.slider{
width:850px;
height:450px;
position:relative;
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
background:white;
}

/* Images */
.slides img{
width:100%;
height:100%;
position:absolute;
opacity:0;
transition:opacity 0.8s ease-in-out;
}

/* Radio buttons hidden */
.slider input{
display:none;
}

/* Show images */
#slide1:checked ~ .slides img:nth-child(1){
opacity:1;
}

#slide2:checked ~ .slides img:nth-child(2){
opacity:1;
}

#slide3:checked ~ .slides img:nth-child(3){
opacity:1;
}

/* Controls */
.controls{
text-align:center;
margin-bottom:15px;
}

.controls label{
display:inline-block;
width:14px;
height:14px;
border-radius:50%;
border:2px solid #0d47a1;
margin:6px;
cursor:pointer;
transition:0.3s;
}

.controls label:hover{
background:#42a5f5;
}

</style>
</head>

<body>

<h1>Picture Slider using Radio Buttons</h1>

<div class="slider">

<input type="radio" name="slider" id="slide1" checked>
<input type="radio" name="slider" id="slide2">
<input type="radio" name="slider" id="slide3">

<div class="slides">
<img src="img 1.jpg">
<img src="img 2.jpg">
<img src="img 3.jpg">
</div>

</div>

<div class="controls">
<label for="slide1"></label>
<label for="slide2"></label>
<label for="slide3"></label>
</div>

</body>
</html>
