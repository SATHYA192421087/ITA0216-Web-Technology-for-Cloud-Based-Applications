<!DOCTYPE html>
<html>
<head>
<title>Multimedia Player</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
padding:40px;
}

.container{
background:white;
color:black;
width:600px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
color:#2a5298;
}

button{
padding:8px 15px;
margin:5px;
border:none;
background:#2a5298;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

input[type=range]{
width:200px;
}

video{
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>🎵 Audio Player</h2>

<audio id="audioPlayer" controls>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<br><br>

<button onclick="volumeUp()">Volume +</button>
<button onclick="volumeDown()">Volume -</button>

<br><br>

Volume:
<input type="range" min="0" max="1" step="0.1"
oninput="setVolume(this.value)">

<hr>

<h2>🎬 Video Player</h2>

<video width="500" controls>
<source src="D:\Movies\With Love (2026) [1080p].mkv" type="video/mp4">
Your browser does not support video
</video>

</div>

<script>

var audio=document.getElementById("audioPlayer");

function volumeUp(){
if(audio.volume<1)
audio.volume+=0.1;
}

function volumeDown(){
if(audio.volume>0)
audio.volume-=0.1;
}

function setVolume(value){
audio.volume=value;
}

</script>

</body>
</html>
