<!DOCTYPE html>
<html>
<head>
<title>Internal CSS Example</title>

<style>
body{
font-family:Arial;
background:#e3f2fd;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#64b5f6;
padding:10px;
text-align:center;
}

section{
margin:20px;
padding:20px;
background:white;
border-radius:8px;
}

footer{
background:#1976d2;
color:white;
text-align:center;
padding:10px;
}
</style>

</head>

<body>

<header>
<h1>My Web Page</h1>
</header>

<nav>
<a href="#">Home</a> |
<a href="#">About</a> |
<a href="#">Contact</a>
</nav>

<section>
<h2>Welcome</h2>
<p>This page is styled using Internal CSS.</p>
</section>

<footer>
<p>Copyright 2026</p>
</footer>

</body>
</html>
