<!DOCTYPE html>
<html>
<head>
    <title>Nearest Odd Number</title>
</head>
<body>

<script>
    let num = parseInt(prompt("Enter a number:"));

    if (num % 2 === 0) {
        alert("Nearest odd number is: " + (num + 1));
    } else {
        alert("The number is already odd: " + num);
    }
</script>

</body>
</html>
