<!DOCTYPE html>
<html>
<head>
<title>Employee Details</title>

<style>
body{
font-family:Arial;
background:#e3f2fd;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:350px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:8px 20px;
background:#1565c0;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:15px;
font-weight:bold;
}
</style>

<script>
function showDetails(){

var name=document.getElementById("name").value;
var id=document.getElementById("id").value;
var dept=document.getElementById("dept").value;
var salary=document.getElementById("salary").value;

document.getElementById("result").innerHTML =
"Employee Name: "+name+"<br>"+
"Employee ID: "+id+"<br>"+
"Department: "+dept+"<br>"+
"Salary: "+salary;

}
</script>

</head>

<body>

<div class="container">

<h2>Employee Details</h2>

<input type="text" id="name" placeholder="Employee Name"><br>
<input type="text" id="id" placeholder="Employee ID"><br>
<input type="text" id="dept" placeholder="Department"><br>
<input type="text" id="salary" placeholder="Salary"><br>

<button onclick="showDetails()">Submit</button>

<div id="result"></div>

</div>

</body>
</html>
